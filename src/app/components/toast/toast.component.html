<div class="toast-host" aria-live="polite" aria-relevant="additions removals">
  @for (t of uiSvc.toasts(); track t.id) {
    <div
      class="toast"
      [ngClass]="'toast--' + (t.type ?? 'info')"
      role="status"
    >
      <div class="toast__msg" [innerText]="t.message"></div>
      <button
        type="button"
        class="toast__close"
        aria-label="Close notification"
        (click)="uiSvc.dismissToast(t.id)"
      >✕</button>
    </div>
  }
</div>
