<div
  class="select"
>
  <label for="select-model" class="trigger">
    <input
      #comboInput
      id="select-model"
      name="select-model"
      class="combo-input"
      [class.used]="usedIn()"
      type="text"
      [placeholder]="selectedOption() ? '' : placeholder()"
      (focus)="open()"
      (blur)="close()"
      [value]="displayedLabel()"
      (input)="onInput($event)"
      (keydown)="onKeyDown($event)"
    />
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M2.36666 5.61324C2.56192 5.41798 2.87851 5.41798 3.07377 5.61324L7.42044 9.95991C7.73851 10.278 8.26192 10.278 8.58 9.95991L12.9267 5.61324C13.1219 5.41798 13.4385 5.41798 13.6338 5.61324C13.829 5.80851 13.829 6.12509 13.6338 6.32035L9.2871 10.667C8.57851 11.3756 7.42192 11.3756 6.71333 10.667L2.36666 6.32035C2.1714 6.12509 2.1714 5.80851 2.36666 5.61324Z" />
        <path fill-rule="evenodd" clip-rule="evenodd" d="M2.36666 5.61324C2.56192 5.41798 2.87851 5.41798 3.07377 5.61324L7.42044 9.95991C7.73851 10.278 8.26192 10.278 8.58 9.95991L12.9267 5.61324C13.1219 5.41798 13.4385 5.41798 13.6338 5.61324C13.829 5.80851 13.829 6.12509 13.6338 6.32035L9.2871 10.667C8.57851 11.3756 7.42192 11.3756 6.71333 10.667L2.36666 6.32035C2.1714 6.12509 2.1714 5.80851 2.36666 5.61324Z" />
      </svg>
  </label>

  @if (isOpen()) {
    <div class="dropdown">
      <div
        #items
        class="items os-pending"
        [style]="`max-height:${maxDropdownHeight()}px`"
      >
        @for (opt of filteredOptions(); track opt.value) {
          @let isSelected = opt.value === value();
          <button
            class="item"
            [class.selected]="isSelected"
            [style]="`padding-right:${paddingRight()}px`"
            (mousedown)="select(opt)"
          >
            <span class="label">{{ opt.label }}</span>
            @if (isSelected) {
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M12.3686 5.00449C12.5552 4.80093 12.5414 4.48465 12.3379 4.29805C12.1343 4.11146 11.818 4.12521 11.6314 4.32877L6.5 9.92668L4.36858 7.60149C4.18198 7.39793 3.8657 7.38418 3.66214 7.57078C3.45858 7.75738 3.44483 8.07366 3.63143 8.27722L6.13143 11.0045C6.22613 11.1078 6.35985 11.1666 6.5 11.1666C6.64016 11.1666 6.77388 11.1078 6.86858 11.0045L12.3686 5.00449Z" />
                <path fill-rule="evenodd" clip-rule="evenodd" d="M12.3686 5.00449C12.5552 4.80093 12.5414 4.48465 12.3379 4.29805C12.1343 4.11146 11.818 4.12521 11.6314 4.32877L6.5 9.92668L4.36858 7.60149C4.18198 7.39793 3.8657 7.38418 3.66214 7.57078C3.45858 7.75738 3.44483 8.07366 3.63143 8.27722L6.13143 11.0045C6.22613 11.1078 6.35985 11.1666 6.5 11.1666C6.64016 11.1666 6.77388 11.1078 6.86858 11.0045L12.3686 5.00449Z" />
              </svg>
            }
          </button>
        }

        @if (filteredOptions().length === 0) { <div class="empty">Nenalezeny žádné položky</div> }
      </div>
    </div>
  }
</div>
