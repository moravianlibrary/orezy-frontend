<h1>Skeny - Přihlášení</h1>

<div class="inputs">
  <label for="email">
    E-MAIL
    <input
      id="email"
      name="email"
      type="email"
      [(ngModel)]="authSvc.username"
    />
  </label>
  <label for="password">
    HESLO
    <input
      id="password"
      name="password"
      type="password"
      [(ngModel)]="authSvc.password"
    />
  </label>
</div>

<span
  class="button real-button primary"
  tabindex="0"
  (click)="authSvc.login()"
>Přihlásit se</span>
