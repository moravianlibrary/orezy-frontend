<div 
  #mainWrapper
  class="main-wrapper"
  (keydown)="edtSvc.onKeyDown($event)"
  (keyup)="edtSvc.onKeyUp($event)"
  tabindex="0"
>
  <app-left-panel-editor></app-left-panel-editor>
  <div class="middle-wrapper">
    <app-main-editor id="app-main"></app-main-editor>
    <app-bottom-panel-editor></app-bottom-panel-editor>
  </div>
  <app-right-panel-editor></app-right-panel-editor>

  <app-dialog (closed)="edtSvc.closeDialog()" />
</div>
